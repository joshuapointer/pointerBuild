services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-pointerbuild}
      POSTGRES_USER: ${DB_USER:-pointer}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pointer} -d ${DB_NAME:-pointerbuild}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY in .env}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY} &&
      mc mb -p local/pointer-updates || true &&
      mc mb -p local/pointer-builds || true &&
      mc anonymous set download local/pointer-updates || true &&
      echo 'buckets ready'
      "
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
    restart: "no"

  pointer-updates:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      args:
        SERVICE: pointer-updates
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${DB_USER:-pointer}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-pointerbuild}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: pointer-updates
      S3_FORCE_PATH_STYLE: "true"
      POINTER_API_KEY: ${POINTER_API_KEY:-}
      PUBLIC_BASE_URL: ${POINTER_UPDATES_PUBLIC_URL:-http://localhost:3001}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  pointer-deploy:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      args:
        SERVICE: pointer-deploy
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgres://${DB_USER:-pointer}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-pointerbuild}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: pointer-builds
      S3_FORCE_PATH_STYLE: "true"
      POINTER_API_KEY: ${POINTER_API_KEY:-}
      PUBLIC_BASE_URL: ${POINTER_DEPLOY_PUBLIC_URL:-http://localhost:3002}
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - pointer-updates
      - pointer-deploy
      - minio

volumes:
  postgres_data:
  minio_data:
