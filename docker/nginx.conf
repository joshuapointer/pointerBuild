worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  client_max_body_size 200m;

  proxy_http_version 1.1;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;

  upstream pointer_updates { server pointer-updates:3001; }
  upstream pointer_deploy  { server pointer-deploy:3002;  }
  upstream minio_api       { server minio:9000;           }
  upstream minio_console   { server minio:9001;           }

  # pointer-updates
  server {
    listen 80;
    server_name updates.* ~^updates\.;
    location / { proxy_pass http://pointer_updates; }
  }

  # pointer-deploy
  server {
    listen 80;
    server_name deploy.* ~^deploy\.;
    location / { proxy_pass http://pointer_deploy; }
  }

  # MinIO S3 API
  server {
    listen 80;
    server_name storage.* ~^storage\.;
    location / { proxy_pass http://minio_api; }
  }

  # MinIO console
  server {
    listen 80;
    server_name console.* ~^console\.;
    location / { proxy_pass http://minio_console; }
  }

  # Default fallback: route by path prefix on the same host.
  server {
    listen 80 default_server;
    server_name _;

    location /updates/  { proxy_pass http://pointer_updates; }
    location /apps      { proxy_pass http://pointer_updates; }
    location /builds/   { proxy_pass http://pointer_deploy;  }
    location /channels/ { proxy_pass http://pointer_deploy;  }
    location /storage/  {
      rewrite ^/storage/(.*)$ /$1 break;
      proxy_pass http://minio_api;
    }
    location /health    { return 200 "ok\n"; }
    location /          { return 404; }
  }
}
